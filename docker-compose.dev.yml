version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: domain_checker_db_dev
    environment:
      POSTGRES_DB: domain_checker
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: domain_checker_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://admin:dev_password@db:5432/domain_checker
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - SECRET_KEY=dev-key-not-for-production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_dev:
